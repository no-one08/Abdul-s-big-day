<audio id="bday-song" loop>
    <source src="song.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
</audio>

<div id="magic-overlay" class="overlay">
    <div class="message-content">
        <h2 class="highlight">To the Realest,</h2>
        <p>
            Five years ago, we were just kids in high school hallways, and honestly, 
            a lot has changed since then. But you? You’ve been the one constant. 
            Thanks for being the brother who stays 100 when the world gets loud. 
            Enjoy your day, Abdul. You earned every bit of this.
        </p>
        <button class="bday-btn" onclick="closeMagic()">Back to Site</button>
    </div>
</div>

<style>
    /* New Styles for the Magic Overlay */
    .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        display: none; /* Hidden by default */
        justify-content: center;
        align-items: center;
        z-index: 1000;
        padding: 20px;
    }

    .message-content {
        max-width: 600px;
        background: var(--glass);
        border: 1px solid var(--accent);
        padding: 40px;
        border-radius: 30px;
        box-shadow: 0 0 50px rgba(0, 242, 255, 0.2);
        animation: scaleUp 0.5s ease;
    }

    .message-content p {
        font-size: 1.3rem;
        line-height: 1.8;
        color: #eee;
    }

    @keyframes scaleUp {
        from { opacity: 0; transform: scale(0.8); }
        to { opacity: 1; transform: scale(1); }
    }
</style>

<script>
    const song = document.getElementById('bday-song');
    const overlay = document.getElementById('magic-overlay');

    function celebrate() {
        // 1. Play the music
        song.play().catch(error => {
            console.log("Autoplay prevented, but playing now on click!");
        });

        // 2. Show the heartfelt message
        overlay.style.display = 'flex';
    }

    function closeMagic() {
        overlay.style.display = 'none';
    }
</script>
